<!DOCTYPE html>
<html lang="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max 100.no</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!---->
    <nav><h1>Max 1000</h1></nav>
    
    <div class="input-panel">
        <div class="box">
            <label>legg til vare</label>
            <input id="vare" type="text" placeholder="Vare">
            <button id="vare_lakt_til">+</button>
        </div>
        <div class="box">
            <label>Endre vare</label>
            <input id="input_id" type="text" placeholder="ID">
            <input id="vare_endring" type="text" placeholder="Vare">
            <button id="vare_endret">*</button>
        </div>
         <div class="box">
            <label>Slette vare</label>
            <input id="input_id2" type="text" placeholder="ID">
            <input id="vare2" type="text" placeholder="Vare">
            <button id="slett">-</button>
        </div>

        <button class="All_vare">Hent alle varer</button>

    </div>
   
    <div class="Panel">
        <div class="Terminal">
            <p id="resultat">/Resultat</p>
        </div>
    </div>

    <footer><p>Laget av Theo</p></footer>
    
</body>
</html>
