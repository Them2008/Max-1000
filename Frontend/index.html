<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max 1000</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav><h1>Max 1000</h1></nav>

    <div class="innput-panel">
        <div class="Box">
            <label>legg til vare</label>
            <input id="vare" type="text" placeholder="Vare">
            <button id="Lakt_til_vare">+</button>
        </div>

        <div class="Box">
            <label>Endre vare</label>
            <input id="input_id1" type="text" placeholder="ID">
            <input id="vare" type="text" placeholder="Vare">
            <button id="endret_vare">*</button>
        </div>

        <div class="Box">
            <label>Slette vare</label>
            <input id="input_id2" type="text" placeholder="ID">
            <input type="text" placeholder="Vare">
            <button id="slette_vare">-</button>
        </div>

        <button id="all_varer">Hent alle varer</button>
    </div>

    <div class="panel">
        <div id="terminal">
            <p>/Resultat</p>
        </div>

    </div>

    <footer><p>Laget av Theo</p></footer>
    
</body>
</html>
