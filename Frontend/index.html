<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Max 1000</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav><h1>Max 1000</h1></nav>

    <div class="panel_input">
         <div class="Box">
            <label>Legge til vare</label>
            <input id="Vare_lagt_input" type="text" placeholder="Vare">
            <button id="Lagd_vare">+</button>
        </div>

        <div class="Box">
            <label>Endre vare</label>
            <input id="input_id1" type="text" placeholder="ID">
            <input id="vare_endres" type="text" placeholder="Vare">
            <button id="Endre_vare">*</button>
        </div>
        <div class="Box">
            <label>Slett vare</label>
            <input id="input_id2" type="text" placeholder="ID">
            <input id="vare_endres" type="text" placeholder="Vare">
            <button id="Slett_vare">-</button>
        </div>

        <button id="Hente_resultat">Hente alle varer</button>
    </div>
    <div class="panel_terminal">
        <div id="Terminal"><p>/resultat</p></div>
    </div>

    <footer><p>Laget av Theo</p></footer>
    
</body>
</html>
